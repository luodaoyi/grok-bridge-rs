<!doctype html>
<html lang="en" data-theme="auto" data-resolved-theme="dark" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Grok Bridge local session console: Codex supervisors and Grok subagent management"
    />
    <title>Grok Bridge Sessions</title>
    <script>
      (() => {
        const themeKey = "grok-bridge-theme";
        const localeKey = "grok-bridge-locale";
        const supported = [
          "zh-CN",
          "zh-TW",
          "en",
          "ru",
          "es",
          "fr",
          "de",
          "ja",
          "ko",
          "id",
          "vi",
          "th",
          "ar",
          "pt-BR",
          "pt-PT",
        ];
        const titles = {
          "zh-CN": "Grok Bridge 会话管理",
          "zh-TW": "Grok Bridge 工作階段管理",
          en: "Grok Bridge Sessions",
          ru: "Сессии Grok Bridge",
          es: "Sesiones Grok Bridge",
          fr: "Sessions Grok Bridge",
          de: "Grok Bridge Sitzungen",
          ja: "Grok Bridge セッション",
          ko: "Grok Bridge 세션",
          id: "Sesi Grok Bridge",
          vi: "Phiên Grok Bridge",
          th: "เซสชัน Grok Bridge",
          ar: "جلسات Grok Bridge",
          "pt-BR": "Grok Bridge — Sessões",
          "pt-PT": "Grok Bridge — Sessões",
        };
        const descriptions = {
          "zh-CN":
            "Grok Bridge 本机会话控制台：Codex 监督者与 Grok 子代理状态管理",
          "zh-TW":
            "Grok Bridge 本機工作階段主控台：Codex 監督者與 Grok 子代理狀態管理",
          en: "Grok Bridge local session console: Codex supervisors and Grok subagent management",
          ru: "Локальная консоль сессий Grok Bridge: супервизоры Codex и управление субагентами Grok",
          es: "Consola local de sesiones Grok Bridge: supervisores Codex y gestión de subagentes Grok",
          fr: "Console locale Grok Bridge : superviseurs Codex et gestion des sous-agents Grok",
          de: "Grok Bridge lokale Sitzungskonsole: Codex-Supervisoren und Grok-Subagenten-Verwaltung",
          ja: "Grok Bridge ローカルセッションコンソール：Codex スーパーバイザーと Grok サブエージェント管理",
          ko: "Grok Bridge 로컬 세션 콘솔: Codex 슈퍼바이저 및 Grok 서브에이전트 관리",
          id: "Konsol sesi lokal Grok Bridge: manajemen supervisor Codex dan subagen Grok",
          vi: "Bảng điều khiển phiên cục bộ Grok Bridge: quản lý giám sát viên Codex và agent con Grok",
          th: "คอนโซลเซสชันท้องถิ่นของ Grok Bridge: จัดการ Codex ซูเปอร์ไวเซอร์และ Grok ซับเอเจนต์",
          ar: "وحدة تحكم الجلسات المحلية لـ Grok Bridge: إدارة مشرفي Codex ووكلاء Grok الفرعيين",
          "pt-BR":
            "Console local do Grok Bridge: gerenciamento de supervisores Codex e subagentes Grok",
          "pt-PT":
            "Consola local do Grok Bridge: gestão de supervisores Codex e subagentes Grok",
        };

        function normalizeLocale(tag) {
          if (!tag) return null;
          const lower = String(tag).toLowerCase().replace(/_/g, "-");
          for (const locale of supported) {
            if (lower === locale.toLowerCase()) return locale;
          }
          const parts = lower.split("-").filter(Boolean);
          if (!parts.length) return null;
          const lang = parts[0];
          if (lang === "zh") {
            if (
              parts.includes("hant") ||
              parts.includes("tw") ||
              parts.includes("hk") ||
              parts.includes("mo")
            ) {
              return "zh-TW";
            }
            return "zh-CN";
          }
          if (lang === "pt") {
            if (parts.includes("br")) return "pt-BR";
            return "pt-PT";
          }
          const primary = {
            en: "en",
            fr: "fr",
            de: "de",
            ru: "ru",
            ja: "ja",
            ko: "ko",
            es: "es",
            id: "id",
            th: "th",
            vi: "vi",
            ar: "ar",
          };
          return primary[lang] || null;
        }

        function detectLocale() {
          const list =
            navigator.languages && navigator.languages.length
              ? navigator.languages
              : navigator.language
                ? [navigator.language]
                : [];
          for (const tag of list) {
            const normalized = normalizeLocale(tag);
            if (normalized) return normalized;
          }
          return "en";
        }

        const root = document.documentElement;
        let preference = "auto";
        try {
          const stored = localStorage.getItem(themeKey);
          if (["auto", "light", "dark"].includes(stored)) preference = stored;
        } catch {}
        const resolved =
          preference === "auto"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : preference;
        root.dataset.theme = preference;
        root.dataset.resolvedTheme = resolved;
        root.dataset.bsTheme = resolved;
        root.style.colorScheme = resolved;
        document.querySelector('meta[name="color-scheme"]').content = resolved;

        let locale = "en";
        try {
          const storedLocale = localStorage.getItem(localeKey);
          if (supported.includes(storedLocale)) locale = storedLocale;
          else locale = detectLocale();
        } catch {
          locale = detectLocale();
        }
        root.lang = locale;
        document.title = titles[locale] || titles.en;
        const meta = document.querySelector('meta[name="description"]');
        if (meta) {
          meta.content = descriptions[locale] || descriptions.en;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
