name: Build and release Skill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  webui:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - run: npm ci
        working-directory: webui
      - run: npm test
        working-directory: webui
      - run: npm run build
        working-directory: webui
      - uses: actions/upload-artifact@v7
        with:
          name: webui-dist
          path: webui/dist
          if-no-files-found: error

  build:
    needs: webui
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/grok-bridge.exe
          - platform: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary: target/aarch64-pc-windows-msvc/release/grok-bridge.exe
          - platform: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/grok-bridge
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: target/aarch64-unknown-linux-gnu/release/grok-bridge
          - platform: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/release/grok-bridge
          - platform: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/grok-bridge
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: webui-dist
          path: webui/dist
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          # Ubuntu ARM runners use ports.ubuntu.com. Prefer HTTPS, force IPv4,
          # and retry transient mirror/network failures.
          sudo sed -i \
            -e 's#http://ports.ubuntu.com/ubuntu-ports#https://ports.ubuntu.com/ubuntu-ports#g' \
            /etc/apt/sources.list \
            /etc/apt/sources.list.d/*.list \
            /etc/apt/sources.list.d/*.sources 2>/dev/null || true

          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config
      - run: rustup target add ${{ matrix.target }}
      - run: cargo test --locked --target ${{ matrix.target }}
      - run: cargo clippy --locked --target ${{ matrix.target }} --all-targets --all-features -- -D warnings
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.platform }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: artifacts

      - name: Assemble Skill archive
        shell: bash
        run: |
          set -euo pipefail
          root="package/grok-build"
          mkdir -p \
            "$root/agents" \
            "$root/hooks/windows" \
            "$root/hooks/unix" \
            "$root/bin/windows-x86_64" \
            "$root/bin/windows-arm64" \
            "$root/bin/linux-x86_64" \
            "$root/bin/linux-arm64" \
            "$root/bin/macos-x86_64" \
            "$root/bin/macos-arm64"

          install -m 0644 README.md "$root/README.md"
          install -m 0644 README-CN.md "$root/README-CN.md"
          install -m 0644 SKILL.md "$root/SKILL.md"
          install -m 0644 agents/openai.yaml "$root/agents/openai.yaml"
          install -m 0644 hooks/windows/grok-bridge.json "$root/hooks/windows/grok-bridge.json"
          install -m 0644 hooks/unix/grok-bridge.json "$root/hooks/unix/grok-bridge.json"
          install -m 0755 artifacts/binary-windows-x86_64/grok-bridge.exe "$root/bin/windows-x86_64/grok-bridge.exe"
          install -m 0755 artifacts/binary-windows-arm64/grok-bridge.exe "$root/bin/windows-arm64/grok-bridge.exe"
          install -m 0755 artifacts/binary-linux-x86_64/grok-bridge "$root/bin/linux-x86_64/grok-bridge"
          install -m 0755 artifacts/binary-linux-arm64/grok-bridge "$root/bin/linux-arm64/grok-bridge"
          install -m 0755 artifacts/binary-macos-x86_64/grok-bridge "$root/bin/macos-x86_64/grok-bridge"
          install -m 0755 artifacts/binary-macos-arm64/grok-bridge "$root/bin/macos-arm64/grok-bridge"

          test "$(find "$root" -type f | wc -l)" -eq 12
          for hook in "$root/hooks/windows/grok-bridge.json" "$root/hooks/unix/grok-bridge.json"; do
            jq -e '.hooks | length == 14' "$hook" >/dev/null
            jq -e '[.hooks[][].hooks[] | select(.env.GROK_BRIDGE_HOOK_PROTOCOL == "4")] | length == 14' "$hook" >/dev/null
          done
          test -x "$root/bin/linux-x86_64/grok-bridge"
          test -x "$root/bin/linux-arm64/grok-bridge"
          test -x "$root/bin/macos-x86_64/grok-bridge"
          test -x "$root/bin/macos-arm64/grok-bridge"

          archive="grok-build-skill-${GITHUB_REF_NAME}.zip"
          (cd package && zip -r "../$archive" grok-build)
          sha256sum "$archive" > "$archive.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          archive="grok-build-skill-${GITHUB_REF_NAME}.zip"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$archive" "$archive.sha256" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$archive" "$archive.sha256" \
              --verify-tag \
              --generate-notes \
              --title "grok-build ${GITHUB_REF_NAME}"
          fi
